schema_version: 1
nodes:
  # Frozen v3 primary line.  Every output is an isolated runner artifact bundle.
  - id: repository_secret_scan
    profile: [icassp, extended]
    command: ["{python}", "scripts/scan_repository_secrets.py", "--output", "artifacts/control/security/repository-secret-scan.v1.json"]
    resource: {kind: cpu, cpus: 1, memory_gb: 4, gpus: 0}
    deps: []
    inputs: []
    outputs: ["artifacts/control/security/repository-secret-scan.v1.json"]
    timeout: 1800
    seed: 0

  - id: ptbxl_manifest
    profile: [icassp, extended]
    command: ["{python}", "scripts/prepare_data_manifests.py", "--cohort", "ptbxl", "--root", "data/ptbxl", "--output", "artifacts/manifests/ptbxl.json"]
    resource: {kind: cpu, cpus: 4, memory_gb: 16, gpus: 0}
    deps: []
    inputs: ["data/ptbxl"]
    outputs: ["artifacts/manifests/ptbxl.json"]
    timeout: 7200
    seed: 0

  - id: chapman_manifest
    profile: [icassp, extended]
    command: ["{python}", "scripts/prepare_data_manifests.py", "--cohort", "chapman", "--root", "data/external/chapman", "--output", "artifacts/manifests/chapman.json"]
    resource: {kind: cpu, cpus: 4, memory_gb: 16, gpus: 0}
    deps: []
    inputs: ["data/external/chapman"]
    outputs: ["artifacts/manifests/chapman.json"]
    timeout: 14400
    seed: 0

  - id: cpsc_manifest
    profile: [icassp, extended]
    command: ["{python}", "scripts/prepare_data_manifests.py", "--cohort", "cpsc2018", "--root", "data/external/cpsc2018", "--output", "artifacts/manifests/cpsc2018.json"]
    resource: {kind: cpu, cpus: 4, memory_gb: 16, gpus: 0}
    deps: []
    inputs: ["data/external/cpsc2018"]
    outputs: ["artifacts/manifests/cpsc2018.json"]
    timeout: 14400
    seed: 0

  - id: public_baseline_checkouts
    profile: [icassp, extended]
    command: ["{python}", "scripts/checkout_upstreams.py", "--model", "all", "--source-root", "upstreams", "--offline", "--destination", "artifacts/upstreams"]
    resource: {kind: cpu, cpus: 2, memory_gb: 8, gpus: 0}
    deps: []
    inputs: ["upstreams"]
    outputs: ["artifacts/upstreams"]
    timeout: 7200
    seed: 0

  - id: arc_stage5_waiting
    profile: [icassp, extended]
    command: ["{python}", "scripts/wait_for_arc_control.py", "--phase", "waiting", "--bundle", "artifacts/gates/arc-stage5-waiting", "--stage", "5", "--output", "artifacts/control/arc/stage5/waiting.v1.json", "--timeout-hours", "24"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: []
    inputs: []
    late_control_inputs: ["artifacts/gates/arc-stage5-waiting"]
    outputs: ["artifacts/control/arc/stage5/waiting.v1.json"]
    timeout: 86700
    seed: 0

  - id: stage5_gate
    profile: [icassp, extended]
    command: ["{python}", "experiments/stage_gates_v3.py", "--mode", "stage5", "--arc-control", "artifacts/control/arc/stage5/waiting.v1.json", "--manuscript", "paper/main_v2.tex", "--registry", "arc_audit/verified_registry.v1.json", "--output-dir", "artifacts/control/stage5"]
    resource: {kind: paper, cpus: 2, memory_gb: 8, gpus: 0}
    deps: [arc_stage5_waiting]
    inputs: ["artifacts/control/arc/stage5/waiting.v1.json", "paper/main_v2.tex", "arc_audit/verified_registry.v1.json"]
    outputs: ["artifacts/control/stage5"]
    timeout: 1800
    seed: 0

  - id: stage5_review
    profile: [icassp, extended]
    command: ["{python}", "scripts/wait_for_stage_review.py", "--gate", "artifacts/control/stage5/decision.v3.json", "--approval", "artifacts/gates/stage5.approval.v3.json", "--public-key", "security/reviewer_ed25519.pub", "--output-dir", "artifacts/control/stage5_review", "--timeout-hours", "24"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [stage5_gate]
    inputs: ["artifacts/control/stage5", "security/reviewer_ed25519.pub"]
    late_control_inputs: ["artifacts/gates/stage5.approval.v3.json"]
    outputs: ["artifacts/control/stage5_review"]
    timeout: 86700
    seed: 0

  - id: arc_stage5_forward
    profile: [icassp, extended]
    command: ["{python}", "scripts/forward_arc_stage_review.py", "--waiting-report", "artifacts/control/arc/stage5/waiting.v1.json", "--reviewed-gate", "artifacts/control/stage5_review/decision.v3.json", "--public-key", "security/reviewer_ed25519.pub", "--output", "artifacts/gates/arc-operator-responses/stage-05/operator-response.v2.json"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [stage5_review, arc_stage5_waiting]
    inputs: ["artifacts/control/arc/stage5/waiting.v1.json", "artifacts/control/stage5_review/decision.v3.json", "security/reviewer_ed25519.pub"]
    outputs: ["artifacts/gates/arc-operator-responses/stage-05/operator-response.v2.json"]
    timeout: 600
    seed: 0

  - id: arc_stage5_control
    profile: [icassp, extended]
    command: ["{python}", "scripts/wait_for_arc_control.py", "--phase", "final", "--bundle", "artifacts/gates/arc-stage5", "--stage", "5", "--output", "artifacts/control/arc/stage5/report.v1.json", "--timeout-hours", "24"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [arc_stage5_forward]
    inputs: ["artifacts/gates/arc-operator-responses/stage-05/operator-response.v2.json"]
    late_control_inputs: ["artifacts/gates/arc-stage5"]
    outputs: ["artifacts/control/arc/stage5/report.v1.json"]
    timeout: 86700
    seed: 0

  - id: arc_stage9_waiting
    profile: [icassp, extended]
    command: ["{python}", "scripts/wait_for_arc_control.py", "--phase", "waiting", "--bundle", "artifacts/gates/arc-stage9-waiting", "--stage", "9", "--previous-report", "artifacts/control/arc/stage5/report.v1.json", "--output", "artifacts/control/arc/stage9/waiting.v1.json", "--timeout-hours", "24"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [arc_stage5_control]
    inputs: ["artifacts/control/arc/stage5/report.v1.json"]
    late_control_inputs: ["artifacts/gates/arc-stage9-waiting"]
    outputs: ["artifacts/control/arc/stage9/waiting.v1.json"]
    timeout: 86700
    seed: 0

  - id: stage9_gate
    profile: [icassp, extended]
    command: ["{python}", "experiments/stage_gates_v3.py", "--mode", "stage9", "--arc-control", "artifacts/control/arc/stage9/waiting.v1.json", "--protocol", "docs/research_protocol.md", "--experiment-manifest", "scripts/experiment_manifest.yaml", "--arc-config", "arc_audit/config.arc.yaml", "--security-status", "security/remote_status.v2.json", "--repository-secret-scan", "artifacts/control/security/repository-secret-scan.v1.json", "--ecgrecover-integration", "config/ecgrecover.integration.v3.json", "--ecgrecover-upstream", "config/ecgrecover.upstream.v1.json", "--ecgrecover-permission", "security/ecgrecover_permission_attestation.v1.json", "--remote-legacy-archive", "security/remote_legacy_archive.v1.json", "--output-dir", "artifacts/control/stage9"]
    resource: {kind: paper, cpus: 2, memory_gb: 8, gpus: 0}
    deps: [arc_stage9_waiting, repository_secret_scan]
    inputs: ["artifacts/control/arc/stage9/waiting.v1.json", "artifacts/control/security/repository-secret-scan.v1.json", "docs/research_protocol.md", "scripts/experiment_manifest.yaml", "arc_audit/config.arc.yaml", "security/remote_status.v2.json", "config/ecgrecover.integration.v3.json", "config/ecgrecover.upstream.v1.json", "security/ecgrecover_permission_attestation.v1.json", "security/remote_legacy_archive.v1.json"]
    outputs: ["artifacts/control/stage9"]
    timeout: 1800
    seed: 0

  - id: stage9_review
    profile: [icassp, extended]
    command: ["{python}", "scripts/wait_for_stage_review.py", "--gate", "artifacts/control/stage9/decision.v3.json", "--approval", "artifacts/gates/stage9.approval.v3.json", "--public-key", "security/reviewer_ed25519.pub", "--output-dir", "artifacts/control/stage9_review", "--timeout-hours", "24"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [stage9_gate]
    inputs: ["artifacts/control/stage9", "security/reviewer_ed25519.pub"]
    late_control_inputs: ["artifacts/gates/stage9.approval.v3.json"]
    outputs: ["artifacts/control/stage9_review"]
    timeout: 86700
    seed: 0

  - id: cuda_contract_tests
    profile: [icassp, extended]
    command: ["{python}", "scripts/run_cuda_contract_tests.py", "--repo", ".", "--upstreams", "artifacts/upstreams", "--output-dir", "artifacts/control/cuda_contract_tests", "--timeout-seconds", "10800"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [public_baseline_checkouts, stage9_review]
    inputs: ["artifacts/upstreams", "artifacts/control/stage9_review"]
    outputs: ["artifacts/control/cuda_contract_tests"]
    timeout: 14400
    seed: 27

  - id: robust_rank_maps
    profile: [icassp, extended]
    command: ["{python}", "experiments/robust_maps_v3.py", "--manifest", "artifacts/manifests/ptbxl.json", "--segments", "QRS,ST,T", "--max-per-record", "40", "--sampling-seed", "20260719", "--n-bootstrap", "2000", "--release", "--output-dir", "artifacts/primary/robust_rank_maps"]
    resource: {kind: cpu, cpus: 10, memory_gb: 56, gpus: 0}
    deps: [ptbxl_manifest, stage9_review]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/control/stage9_review"]
    outputs: ["artifacts/primary/robust_rank_maps"]
    timeout: 28800
    seed: 0

  - id: reconstruction_candidates
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_candidates_v3.py", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--output-dir", "artifacts/primary/reconstruction_candidates", "--device", "cuda:0", "--release"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, stage9_review, cuda_contract_tests]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/control/stage9_review", "artifacts/control/cuda_contract_tests"]
    outputs: ["artifacts/primary/reconstruction_candidates"]
    timeout: 86400
    seed: 0

  - id: reconstruction_training_inclusion
    profile: [icassp, extended]
    command: ["{python}", "scripts/prepare_training_inclusion_v3.py", "--manifest", "artifacts/manifests/ptbxl.json", "--output-dir", "artifacts/primary/reconstruction_training_inclusion", "--release"]
    resource: {kind: cpu, cpus: 8, memory_gb: 16, gpus: 0}
    deps: [ptbxl_manifest, stage9_review]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/control/stage9_review"]
    outputs: ["artifacts/primary/reconstruction_training_inclusion"]
    timeout: 43200
    seed: 0

  - id: official_baseline_preparation
    profile: [icassp, extended]
    command: ["{python}", "scripts/prepare_official_baselines_v3.py", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--upstreams", "artifacts/upstreams", "--ecgrecover-integration", "config/ecgrecover.integration.v3.json", "--output-dir", "artifacts/primary/official_baselines", "--seeds", "0,1,2,3,4", "--release"]
    resource: {kind: cpu, cpus: 10, memory_gb: 56, gpus: 0}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, public_baseline_checkouts, stage9_review, cuda_contract_tests]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/upstreams", "artifacts/control/stage9_review", "artifacts/control/cuda_contract_tests", "config/ecgrecover.integration.v3.json"]
    outputs: ["artifacts/primary/official_baselines"]
    timeout: 28800
    seed: 0

  - id: reconstruction_tuning
    profile: [icassp, extended]
    command: ["{python}", "experiments/tune_reconstructors_v3.py", "--manifest", "artifacts/manifests/ptbxl.json", "--candidate-bundle", "artifacts/primary/reconstruction_candidates/candidate_bundle.json", "--official-config", "artifacts/primary/official_baselines/official-reconstruction-config-v3.json", "--output", "artifacts/primary/reconstruction_tuning.v3.json"]
    resource: {kind: cpu, cpus: 4, memory_gb: 16, gpus: 0}
    deps: [ptbxl_manifest, reconstruction_candidates, official_baseline_preparation]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_candidates", "artifacts/primary/official_baselines"]
    outputs: ["artifacts/primary/reconstruction_tuning.v3.json"]
    timeout: 7200
    seed: 0

  - id: benchmark_lowrank
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_benchmark_v3.py", "--method", "lowrank", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--tuning-config", "artifacts/primary/reconstruction_tuning.v3.json", "--release", "--output-dir", "artifacts/primary/reconstruction/lowrank"]
    resource: {kind: cpu, cpus: 10, memory_gb: 56, gpus: 0}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, robust_rank_maps, reconstruction_tuning]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction_tuning.v3.json"]
    outputs: ["artifacts/primary/reconstruction/lowrank"]
    timeout: 21600
    seed: 0

  - id: benchmark_ridge
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_benchmark_v3.py", "--method", "ridge", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--tuning-config", "artifacts/primary/reconstruction_tuning.v3.json", "--release", "--output-dir", "artifacts/primary/reconstruction/ridge"]
    resource: {kind: cpu, cpus: 10, memory_gb: 56, gpus: 0}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, robust_rank_maps, reconstruction_tuning]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction_tuning.v3.json"]
    outputs: ["artifacts/primary/reconstruction/ridge"]
    timeout: 21600
    seed: 0

  - id: benchmark_masked_unet
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_benchmark_v3.py", "--method", "masked-unet", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--tuning-config", "artifacts/primary/reconstruction_tuning.v3.json", "--device", "cuda:0", "--seeds", "0,1,2,3,4", "--release", "--output-dir", "artifacts/primary/reconstruction/masked_unet"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, robust_rank_maps, reconstruction_tuning]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction_tuning.v3.json"]
    outputs: ["artifacts/primary/reconstruction/masked_unet"]
    timeout: 86400
    seed: 0

  - id: benchmark_imputeecg
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_benchmark_v3.py", "--method", "imputeecg", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--upstreams", "artifacts/upstreams", "--tuning-config", "artifacts/primary/reconstruction_tuning.v3.json", "--official-config", "artifacts/primary/official_baselines/imputeecg.config.v3.json", "--device", "cuda:0", "--seeds", "0,1,2,3,4", "--release", "--output-dir", "artifacts/primary/reconstruction/imputeecg"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, public_baseline_checkouts, robust_rank_maps, official_baseline_preparation, reconstruction_tuning]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/upstreams", "artifacts/primary/robust_rank_maps", "artifacts/primary/official_baselines", "artifacts/primary/reconstruction_tuning.v3.json"]
    outputs: ["artifacts/primary/reconstruction/imputeecg"]
    timeout: 86400
    seed: 0

  - id: benchmark_ecgrecover
    profile: [icassp, extended]
    command: ["{python}", "experiments/reconstruction_benchmark_v3.py", "--method", "ecgrecover", "--manifest", "artifacts/manifests/ptbxl.json", "--training-inclusion", "artifacts/primary/reconstruction_training_inclusion/training_inclusion.v1.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--upstreams", "artifacts/upstreams", "--tuning-config", "artifacts/primary/reconstruction_tuning.v3.json", "--official-config", "artifacts/primary/official_baselines/ecgrecover.config.v3.json", "--seeds", "0,1,2,3,4", "--release", "--output-dir", "artifacts/primary/reconstruction/ecgrecover"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, reconstruction_training_inclusion, public_baseline_checkouts, robust_rank_maps, official_baseline_preparation, reconstruction_tuning]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/primary/reconstruction_training_inclusion", "artifacts/upstreams", "artifacts/primary/robust_rank_maps", "artifacts/primary/official_baselines", "artifacts/primary/reconstruction_tuning.v3.json"]
    outputs: ["artifacts/primary/reconstruction/ecgrecover"]
    timeout: 86400
    seed: 0

  - id: zero_transfer_chapman
    profile: [icassp, extended]
    command: ["{python}", "experiments/external_validation_v3.py", "--mode", "zero-transfer", "--cohort", "chapman", "--source-manifest", "artifacts/manifests/ptbxl.json", "--target-manifest", "artifacts/manifests/chapman.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--benchmark", "artifacts/primary/reconstruction/lowrank", "--benchmark", "artifacts/primary/reconstruction/ridge", "--benchmark", "artifacts/primary/reconstruction/masked_unet", "--benchmark", "artifacts/primary/reconstruction/imputeecg", "--benchmark", "artifacts/primary/reconstruction/ecgrecover", "--n-bootstrap", "2000", "--release", "--output-dir", "artifacts/primary/zero_transfer/chapman"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, chapman_manifest, public_baseline_checkouts, robust_rank_maps, benchmark_lowrank, benchmark_ridge, benchmark_masked_unet, benchmark_imputeecg, benchmark_ecgrecover]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/manifests/chapman.json", "artifacts/upstreams", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction/lowrank", "artifacts/primary/reconstruction/ridge", "artifacts/primary/reconstruction/masked_unet", "artifacts/primary/reconstruction/imputeecg", "artifacts/primary/reconstruction/ecgrecover"]
    outputs: ["artifacts/primary/zero_transfer/chapman"]
    timeout: 86400
    seed: 0

  - id: zero_transfer_cpsc
    profile: [icassp, extended]
    command: ["{python}", "experiments/external_validation_v3.py", "--mode", "zero-transfer", "--cohort", "cpsc2018", "--source-manifest", "artifacts/manifests/ptbxl.json", "--target-manifest", "artifacts/manifests/cpsc2018.json", "--rank-maps", "artifacts/primary/robust_rank_maps", "--benchmark", "artifacts/primary/reconstruction/lowrank", "--benchmark", "artifacts/primary/reconstruction/ridge", "--benchmark", "artifacts/primary/reconstruction/masked_unet", "--benchmark", "artifacts/primary/reconstruction/imputeecg", "--benchmark", "artifacts/primary/reconstruction/ecgrecover", "--n-bootstrap", "2000", "--release", "--output-dir", "artifacts/primary/zero_transfer/cpsc2018"]
    resource: {kind: gpu, cpus: 8, memory_gb: 56, gpus: 1}
    deps: [ptbxl_manifest, cpsc_manifest, public_baseline_checkouts, robust_rank_maps, benchmark_lowrank, benchmark_ridge, benchmark_masked_unet, benchmark_imputeecg, benchmark_ecgrecover]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/manifests/cpsc2018.json", "artifacts/upstreams", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction/lowrank", "artifacts/primary/reconstruction/ridge", "artifacts/primary/reconstruction/masked_unet", "artifacts/primary/reconstruction/imputeecg", "artifacts/primary/reconstruction/ecgrecover"]
    outputs: ["artifacts/primary/zero_transfer/cpsc2018"]
    timeout: 86400
    seed: 0

  - id: meta_analysis
    profile: [icassp, extended]
    command: ["{python}", "experiments/meta_analysis_v3.py", "--mode", "analyze", "--rank-maps", "artifacts/primary/robust_rank_maps", "--ptbxl-manifest", "artifacts/manifests/ptbxl.json", "--external-manifest", "artifacts/manifests/chapman.json", "--external-manifest", "artifacts/manifests/cpsc2018.json", "--benchmark", "artifacts/primary/reconstruction/lowrank", "--benchmark", "artifacts/primary/reconstruction/ridge", "--benchmark", "artifacts/primary/reconstruction/masked_unet", "--benchmark", "artifacts/primary/reconstruction/imputeecg", "--benchmark", "artifacts/primary/reconstruction/ecgrecover", "--external", "artifacts/primary/zero_transfer/chapman", "--external", "artifacts/primary/zero_transfer/cpsc2018", "--bootstrap-replicates", "2000", "--release", "--output-dir", "artifacts/primary/meta_analysis"]
    resource: {kind: cpu, cpus: 10, memory_gb: 56, gpus: 0}
    deps: [ptbxl_manifest, chapman_manifest, cpsc_manifest, robust_rank_maps, benchmark_lowrank, benchmark_ridge, benchmark_masked_unet, benchmark_imputeecg, benchmark_ecgrecover, zero_transfer_chapman, zero_transfer_cpsc]
    inputs: ["artifacts/manifests/ptbxl.json", "artifacts/manifests/chapman.json", "artifacts/manifests/cpsc2018.json", "artifacts/primary/robust_rank_maps", "artifacts/primary/reconstruction/lowrank", "artifacts/primary/reconstruction/ridge", "artifacts/primary/reconstruction/masked_unet", "artifacts/primary/reconstruction/imputeecg", "artifacts/primary/reconstruction/ecgrecover", "artifacts/primary/zero_transfer/chapman", "artifacts/primary/zero_transfer/cpsc2018"]
    outputs: ["artifacts/primary/meta_analysis"]
    timeout: 43200
    seed: 0

  # The signed Stage-9 protocol decision unlocks native experiments, while ARC
  # itself remains blocked at Stage 9.  Forward only after all Stage-15 numeric
  # evidence exists, preventing ARC from starting its 24-hour Stage-15 clock early.
  - id: arc_stage9_forward
    profile: [icassp, extended]
    command: ["{python}", "scripts/forward_arc_stage_review.py", "--waiting-report", "artifacts/control/arc/stage9/waiting.v1.json", "--reviewed-gate", "artifacts/control/stage9_review/decision.v3.json", "--public-key", "security/reviewer_ed25519.pub", "--output", "artifacts/gates/arc-operator-responses/stage-09/operator-response.v2.json"]
    resource: {kind: paper, cpus: 1, memory_gb: 4, gpus: 0}
    deps: [stage9_review, meta_analysis, arc_stage9_waiting]
    inputs: ["artifacts/control/arc/stage9/waiting.v1.json", "artifacts/control/stage9_review/decision.v3.json", "artifacts/primary/meta_analysis", "security/reviewer_ed25519.pub"]
    outputs: ["artifacts/gates/arc-operator-responses/stage-09/operator-response.v2.json"]
    timeout: 600
    seed: 0

  - id: arc_stage9_control
    profile: [icassp, extended]
